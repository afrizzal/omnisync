services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: omnisync
      POSTGRES_PASSWORD: omnisync
      POSTGRES_DB: omnisync
    ports:
      # Host 5433 → container 5432: avoids clash with a native PostgreSQL on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnisync"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--maxmemory-policy", "noeviction", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    stop_grace_period: 35s  # allows 30s shutdown timer before SIGKILL (research Pattern 4)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-crm:
        condition: service_healthy

  mock-crm:
    build:
      context: .
      dockerfile: apps/mock-crm/Dockerfile
    env_file: .env
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/admin/failure-mode').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
