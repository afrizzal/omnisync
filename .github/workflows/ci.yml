name: CI

on:
  push: {}
  pull_request: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://omnisync:omnisync@localhost:5432/omnisync
      DIRECT_URL: postgresql://omnisync:omnisync@localhost:5432/omnisync
      REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omnisync
          POSTGRES_PASSWORD: omnisync
          POSTGRES_DB: omnisync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omnisync"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Reads packageManager field from root package.json automatically

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @omnisync/db generate

      - name: Apply database migrations
        run: pnpm --filter @omnisync/db exec prisma migrate deploy

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test (with coverage gate)
        run: pnpm test -- --coverage

      - name: Lint
        run: pnpm lint

  # OPS-01/D-09: build all three images on every push & PR (validates Dockerfiles);
  # push to GHCR only on master. PRs are build-only (push:false) — no throwaway images.
  # Runs after `verify` so broken code never produces a published image.
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnisync-api:latest
            ghcr.io/${{ github.repository_owner }}/omnisync-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnisync-worker:latest
            ghcr.io/${{ github.repository_owner }}/omnisync-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push mock-crm
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mock-crm/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnisync-mock-crm:latest
            ghcr.io/${{ github.repository_owner }}/omnisync-mock-crm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # TST-04: Playwright E2E test — DLQ re-queue flow against the full docker compose stack.
  # Spins up all services, seeds a DLQ entry deterministically (mock-crm fail mode + signed webhook),
  # waits for it to appear, then runs the Playwright DLQ re-queue spec headlessly.
  e2e:
    name: Playwright E2E (DLQ re-queue)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Create .env for compose
        run: cp .env.example .env

      - name: Start compose stack
        run: docker compose up --build -d

      - name: Wait for API + dashboard health
        run: |
          timeout 180 bash -c 'until curl -sf http://localhost:3001/healthz >/dev/null; do sleep 2; done'
          timeout 180 bash -c 'until curl -sf http://localhost:3000 >/dev/null; do sleep 2; done'

      # Fresh compose volume = empty database. Containers do NOT auto-migrate on boot
      # (decision 260621-j8p) — apply migrations from the host against the published port.
      - name: Apply database migrations
        run: pnpm --filter @omnisync/db exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://omnisync:omnisync@localhost:5433/omnisync?schema=public
          DIRECT_URL: postgresql://omnisync:omnisync@localhost:5433/omnisync?schema=public

      - name: Seed a DLQ entry (mock-crm fail mode + signed webhook)
        run: |
          set -euo pipefail
          # 1. Force mock-crm to fail every CRM sync.
          curl -sf -X POST http://localhost:3002/admin/failure-mode \
            -H 'content-type: application/json' -d '{"mode":"fail","rate":1}'
          # 2. Fire one valid signed shopee webhook (HMAC over the exact body bytes).
          SECRET="dev-secret-shopee"
          BODY='{"eventType":"order.created","externalId":"e2e-seed-1","occurredAt":"2026-01-01T00:00:00.000Z","payload":{"amount":1}}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //')
          curl -sf -X POST http://localhost:3001/ingest/shopee \
            -H 'content-type: application/json' \
            -H "x-webhook-signature: sha256=$SIG" \
            -d "$BODY"

      - name: Wait for DLQ entry to appear (retries exhaust -> dlq_events)
        run: |
          timeout 120 bash -c 'until [ "$(curl -sf http://localhost:3001/api/dlq | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>console.log(JSON.parse(d).entries.length))")" -ge 1 ]; do sleep 3; done'

      - name: Run Playwright E2E
        run: pnpm exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:3001

      - name: Collect compose logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: |
            playwright-report/
            test-results/
            compose-logs.txt

      - name: Teardown
        if: always()
        run: docker compose down -v
