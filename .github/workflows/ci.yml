name: CI

on:
  push: {}
  pull_request: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://omnisync:omnisync@localhost:5432/omnisync
      DIRECT_URL: postgresql://omnisync:omnisync@localhost:5432/omnisync
      REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omnisync
          POSTGRES_PASSWORD: omnisync
          POSTGRES_DB: omnisync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omnisync"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Reads packageManager field from root package.json automatically

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @omnisync/db generate

      - name: Apply database migrations
        run: pnpm --filter @omnisync/db exec prisma migrate deploy

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test (with coverage gate)
        run: pnpm test -- --coverage

      - name: Lint
        run: pnpm lint

  # OPS-01/D-09: build all three images on every push & PR (validates Dockerfiles);
  # push to GHCR only on master. PRs are build-only (push:false) — no throwaway images.
  # Runs after `verify` so broken code never produces a published image.
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnisync-api:latest
            ghcr.io/${{ github.repository_owner }}/omnisync-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnisync-worker:latest
            ghcr.io/${{ github.repository_owner }}/omnisync-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push mock-crm
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mock-crm/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnisync-mock-crm:latest
            ghcr.io/${{ github.repository_owner }}/omnisync-mock-crm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
